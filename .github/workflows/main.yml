name: Build Paper 1.12.2
on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ ver/1.12.2 ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # 🔥 🔥 🔥 这一步是唯一能解决你报错的命令
      - name: Generate Sources & Apply Patches
        run: mvn install -N && mvn package -DskipTests

      # 上传构建好的服务端
      - name: Upload Paper Server
        uses: actions/upload-artifact@v4
        with:
          name: paper-1.12.2-server
          path: paper-server/target/*.jar
